<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Harris County | Motivated Seller Leads</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:      #0a1e27;
    --surface: #0d2e3a;
    --border:  #1a4155;
    --accent:  #F5A800;
    --accent2: #C47A1E;
    --accent3: #2AB8B8;
    --text:    #e8f4f4;
    --muted:   #5a8a95;
    --mono: 'Space Mono', monospace;
    --sans: 'Syne', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ─── HEADER ─────────────────────────────────────── */
  header {
    border-bottom: 1px solid var(--border);
    padding: 1.5rem 2.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(10,12,16,0.92);
    backdrop-filter: blur(12px);
  }

  .logo {
    display: flex;
    align-items: baseline;
    gap: 0.6rem;
  }
  .logo-tag {
    font-family: var(--mono);
    font-size: 0.7rem;
    background: var(--accent);
    color: #0a1e27;
    padding: 0.15rem 0.5rem;
    font-weight: 700;
    letter-spacing: 0.05em;
  }
  .logo-title {
    font-size: 1.1rem;
    font-weight: 800;
    letter-spacing: -0.02em;
  }

  .header-meta {
    font-family: var(--mono);
    font-size: 0.72rem;
    color: var(--muted);
    text-align: right;
    line-height: 1.6;
  }

  /* ─── STATS BAR ───────────────────────────────────── */
  .stats-bar {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    border-bottom: 1px solid var(--border);
  }

  .stat-card {
    padding: 1.4rem 2rem;
    border-right: 1px solid var(--border);
  }
  .stat-card:last-child { border-right: none; }
  .stat-label {
    font-family: var(--mono);
    font-size: 0.65rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin-bottom: 0.4rem;
  }
  .stat-value {
    font-size: 2rem;
    font-weight: 800;
    letter-spacing: -0.04em;
    line-height: 1;
  }
  .stat-value.accent { color: var(--accent); }
  .stat-value.danger { color: var(--accent2); }
  .stat-value.teal   { color: var(--accent3); }

  /* ─── TOOLBAR ─────────────────────────────────────── */
  .toolbar {
    padding: 1rem 2.5rem;
    display: flex;
    gap: 0.75rem;
    align-items: center;
    flex-wrap: wrap;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  .toolbar input[type="text"] {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 0.5rem 0.9rem;
    font-family: var(--mono);
    font-size: 0.78rem;
    width: 220px;
    outline: none;
    transition: border-color 0.15s;
  }
  .toolbar input[type="text"]:focus {
    border-color: var(--accent);
  }

  .filter-btn {
    font-family: var(--mono);
    font-size: 0.68rem;
    padding: 0.4rem 0.85rem;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .filter-btn:hover, .filter-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(245,168,0,0.08);
  }

  .spacer { flex: 1; }

  .export-btn {
    font-family: var(--mono);
    font-size: 0.72rem;
    padding: 0.5rem 1.1rem;
    background: var(--accent);
    border: none;
    color: #0a1e27;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    transition: opacity 0.15s;
  }
  .export-btn:hover { opacity: 0.85; }

  /* ─── MAIN GRID ───────────────────────────────────── */
  main {
    padding: 1.5rem 2.5rem;
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  /* ─── LEAD CARD ───────────────────────────────────── */
  .lead-card {
    border: 1px solid var(--border);
    border-top: none;
    display: grid;
    grid-template-columns: 56px 1fr 180px 120px;
    align-items: stretch;
    transition: background 0.12s;
    animation: fadeIn 0.3s ease both;
  }
  .lead-card:first-child { border-top: 1px solid var(--border); }
  .lead-card:hover { background: rgba(255,255,255,0.02); }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Score column */
  .score-col {
    display: flex;
    align-items: center;
    justify-content: center;
    border-right: 1px solid var(--border);
    padding: 0.6rem 0;
    writing-mode: vertical-rl;
  }
  .score-ring {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--mono);
    font-size: 0.7rem;
    font-weight: 700;
    flex-shrink: 0;
    position: relative;
  }
  /* Score colors: red=70+, orange=40-69, white=below 40 */
  .score-red    { background: rgba(245,168,0,0.18);   color: #F5A800;  border: 2px solid #F5A800; box-shadow: 0 0 10px rgba(245,168,0,0.25); }
  .score-orange { background: rgba(42,184,184,0.15);  color: #2AB8B8;  border: 2px solid #2AB8B8; }
  .score-white  { background: rgba(26,65,85,0.4);     color: #5a8a95;  border: 1.5px solid #1a4155; }
  .lead-card.tier-red    { border-left: 3px solid #F5A800; }
  .lead-card.tier-orange { border-left: 3px solid #2AB8B8; }
  .lead-card.tier-white  { border-left: 3px solid #1a4155; }

  /* Main content */
  .card-body {
    padding: 0.85rem 1.2rem;
    display: flex;
    flex-direction: column;
    gap: 0.35rem;
    border-right: 1px solid var(--border);
  }

  .card-top {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    flex-wrap: wrap;
  }

  .cat-badge {
    font-family: var(--mono);
    font-size: 0.6rem;
    padding: 0.18rem 0.5rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    flex-shrink: 0;
  }
  .cat-LP       { background: rgba(245,168,0,0.18);  color: #F5A800; }
  .cat-NOFC     { background: rgba(196,122,30,0.22); color: #e89030; }
  .cat-TAXDEED  { background: rgba(245,168,0,0.14);  color: #f0b030; }
  .cat-JUD, .cat-CCJ, .cat-DRJUD { background: rgba(42,184,184,0.15); color: #2AB8B8; }
  .cat-LN, .cat-LNMECH, .cat-LNHOA, .cat-LNCORPTX, .cat-LNIRS, .cat-LNFED { background: rgba(42,184,184,0.12); color: var(--accent3); }
  .cat-MEDLN    { background: rgba(196,122,30,0.15); color: #C47A1E; }
  .cat-PRO      { background: rgba(30,100,120,0.35); color: #5ad0d0; }
  .cat-NOC      { background: rgba(245,168,0,0.10);  color: var(--accent); }
  .cat-RELLP    { background: rgba(26,65,85,0.5);    color: var(--muted); }
  .cat-OTHER    { background: rgba(26,65,85,0.4);    color: var(--muted); }

  .doc-num {
    font-family: var(--mono);
    font-size: 0.65rem;
    color: var(--muted);
  }

  .owner-name {
    font-size: 0.95rem;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 400px;
  }

  .card-addresses {
    display: flex;
    gap: 2rem;
    flex-wrap: wrap;
  }

  .addr-block { display: flex; flex-direction: column; gap: 0.05rem; }
  .addr-label {
    font-family: var(--mono);
    font-size: 0.58rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .addr-value {
    font-size: 0.78rem;
    color: #9aa3bb;
  }
  .addr-value.no-addr { color: var(--muted); font-style: italic; }

  .flag-row {
    display: flex;
    gap: 0.35rem;
    flex-wrap: wrap;
  }
  .flag {
    font-family: var(--mono);
    font-size: 0.58rem;
    padding: 0.1rem 0.42rem;
    border: 1px solid var(--border);
    color: var(--muted);
    letter-spacing: 0.04em;
  }
  .flag-distress { border-color: rgba(245,168,0,0.5);  color: #F5A800; background: rgba(245,168,0,0.1); }
  .flag-warn     { border-color: rgba(42,184,184,0.4); color: #2AB8B8; background: rgba(42,184,184,0.08); }

  /* Amount column */
  .amount-col {
    padding: 0.85rem 1rem;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: flex-end;
    gap: 0.25rem;
    border-right: 1px solid var(--border);
  }
  .amount-value {
    font-family: var(--mono);
    font-size: 0.82rem;
    font-weight: 700;
    color: #F5A800;
  }
  .filed-date {
    font-family: var(--mono);
    font-size: 0.62rem;
    color: var(--muted);
  }

  /* Actions column */
  .actions-col {
    padding: 0.85rem 1rem;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: flex-end;
    gap: 0.5rem;
  }

  .link-btn {
    font-family: var(--mono);
    font-size: 0.62rem;
    color: var(--accent);
    text-decoration: none;
    border: 1px solid rgba(245,168,0,0.35);
    padding: 0.25rem 0.55rem;
    transition: all 0.15s;
    letter-spacing: 0.03em;
  }
  .link-btn:hover {
    background: rgba(245,168,0,0.1);
    border-color: var(--accent);
  }

  /* ─── EMPTY STATE ─────────────────────────────────── */
  .empty-state {
    text-align: center;
    padding: 5rem 2rem;
    color: var(--muted);
  }
  .empty-state h2 {
    font-size: 1.5rem;
    font-weight: 800;
    margin-bottom: 0.5rem;
    color: var(--text);
  }
  .empty-state p { font-family: var(--mono); font-size: 0.75rem; }

  /* ─── COLUMN HEADERS ──────────────────────────────── */
  .col-headers {
    display: grid;
    grid-template-columns: 56px 1fr 180px 120px;
    border: 1px solid var(--border);
    background: var(--surface);
  }
  .col-h {
    padding: 0.5rem 1rem;
    font-family: var(--mono);
    font-size: 0.58rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    border-right: 1px solid var(--border);
  }
  .col-h:last-child { border-right: none; }
  .col-h.center { text-align: center; }
  .col-h.right  { text-align: right; }

  /* ─── LOADING ─────────────────────────────────────── */
  .loading {
    text-align: center;
    padding: 4rem;
    font-family: var(--mono);
    font-size: 0.8rem;
    color: var(--muted);
  }
  .loading::after {
    content: '';
    display: inline-block;
    animation: dots 1.2s steps(4, end) infinite;
  }
  @keyframes dots {
    0%   { content: ''; }
    25%  { content: '.'; }
    50%  { content: '..'; }
    75%  { content: '...'; }
    100% { content: ''; }
  }

  /* ─── FOOTER ──────────────────────────────────────── */
  footer {
    text-align: center;
    padding: 2rem;
    font-family: var(--mono);
    font-size: 0.65rem;
    color: var(--muted);
    border-top: 1px solid var(--border);
    margin-top: 2rem;
  }

  @media (max-width: 900px) {
    .stats-bar { grid-template-columns: repeat(2, 1fr); }
    .lead-card { grid-template-columns: 50px 1fr; }
    .amount-col, .actions-col { display: none; }
    .col-headers { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-tag">HC</span>
    <span class="logo-title">Motivated Seller Leads</span>
    <span style="font-size:0.75rem;color:var(--muted);margin-left:0.3rem">Harris County, TX</span>
  </div>
  <div class="header-meta">
    <div id="hdr-fetch">Loading…</div>
    <div id="hdr-range" style="color:#2AB8B8">—</div>
  </div>
</header>

<div class="stats-bar">
  <div class="stat-card">
    <div class="stat-label">Total Leads</div>
    <div class="stat-value accent" id="stat-total">—</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">With Address</div>
    <div class="stat-value teal" id="stat-addr">—</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">High Score (70+)</div>
    <div class="stat-value danger" id="stat-high">—</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Avg Score</div>
    <div class="stat-value" id="stat-avg">—</div>
  </div>
  <div class="stat-card" style="background:rgba(245,168,0,0.08);border-left:2px solid #F5A800">
    <div class="stat-label" style="color:#F5A800">★ Hot (70+)</div>
    <div class="stat-value" style="color:#F5A800" id="stat-red">—</div>
  </div>
  <div class="stat-card" style="background:rgba(42,184,184,0.06);border-left:2px solid #2AB8B8">
    <div class="stat-label" style="color:#2AB8B8">◆ Warm (40–69)</div>
    <div class="stat-value" style="color:#2AB8B8" id="stat-orange">—</div>
  </div>
</div>

<div class="toolbar">
  <input type="text" id="search-input" placeholder="Search owner, doc #, address…"/>

  <button class="filter-btn active" data-cat="">ALL</button>
  <button class="filter-btn" data-cat="LP">LP</button>
  <button class="filter-btn" data-cat="NOFC">NOFC</button>
  <button class="filter-btn" data-cat="TAXDEED">TAX DEED</button>
  <button class="filter-btn" data-cat="JUD">JUD</button>
  <button class="filter-btn" data-cat="LN">LIENS</button>
  <button class="filter-btn" data-cat="PRO">PROBATE</button>

  <div class="spacer"></div>
  <select id="sort-select" style="font-family:var(--mono);font-size:0.68rem;background:var(--surface);border:1px solid var(--border);color:var(--muted);padding:0.4rem 0.7rem;cursor:pointer;outline:none;">
    <option value="score">Sort: Score ↓</option>
    <option value="date">Sort: Date ↓</option>
    <option value="amount">Sort: Amount ↓</option>
  </select>
  <button class="export-btn" id="export-csv">↓ Export GHL CSV</button>
</div>

<main>
  <div id="results-wrap">
    <div class="loading">Loading records</div>
  </div>
</main>

<footer>
  Data sourced from Harris County Clerk public records &amp; HCAD parcel data.
  For informational purposes only. Refreshed daily at 07:00 CT.
</footer>

<script>
// ─── State ───────────────────────────────────────────
let allRecords = [];
let activeFilter = '';

// ─── Boot ────────────────────────────────────────────
fetch('./records.json')
  .then(r => r.json())
  .then(data => {
    allRecords = data.records || [];

    // Header
    document.getElementById('hdr-fetch').textContent =
      'Fetched: ' + (data.fetched_at ? new Date(data.fetched_at).toLocaleString() : '—');
    const dr = data.date_range || {};
    document.getElementById('hdr-range').textContent =
      (dr.start || '—') + ' → ' + (dr.end || '—');

    // Stats
    document.getElementById('stat-total').textContent = data.total ?? allRecords.length;
    document.getElementById('stat-addr').textContent = data.with_address ?? 0;
    const highScore = allRecords.filter(r => (r.score || 0) >= 70).length;
    document.getElementById('stat-high').textContent = highScore;
    const avg = allRecords.length
      ? Math.round(allRecords.reduce((s, r) => s + (r.score || 0), 0) / allRecords.length)
      : 0;
    document.getElementById('stat-avg').textContent = avg;
    document.getElementById('stat-red').textContent = allRecords.filter(r => (r.score||0) >= 70).length;
    document.getElementById('stat-orange').textContent = allRecords.filter(r => (r.score||0) >= 40 && (r.score||0) < 70).length;

    render();
  })
  .catch(err => {
    document.getElementById('results-wrap').innerHTML =
      '<div class="empty-state"><h2>No Data</h2><p>records.json not found or empty. Run the scraper first.</p></div>';
  });

// ─── Filters ─────────────────────────────────────────
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.cat;
    render();
  });
});

document.getElementById('search-input').addEventListener('input', render);
document.getElementById('sort-select').addEventListener('change', render);

// ─── Render ──────────────────────────────────────────
function render() {
  const query    = document.getElementById('search-input').value.toLowerCase().trim();
  const sortBy   = document.getElementById('sort-select').value;

  let filtered = allRecords.filter(r => {
    if (activeFilter) {
      // Group liens
      if (activeFilter === 'LN') {
        if (!['LN','LNMECH','LNHOA','LNCORPTX','LNIRS','LNFED','MEDLN'].includes(r.cat)) return false;
      } else if (!r.cat.startsWith(activeFilter)) return false;
    }
    if (query) {
      const hay = [r.owner, r.doc_num, r.prop_address, r.mail_address, r.cat_label]
        .join(' ').toLowerCase();
      if (!hay.includes(query)) return false;
    }
    return true;
  });

  const wrap = document.getElementById('results-wrap');

  // Sort
  filtered = [...filtered].sort((a, b) => {
    if (sortBy === 'date') {
      return (b.filed || '').localeCompare(a.filed || '');
    } else if (sortBy === 'amount') {
      return (b.amount || 0) - (a.amount || 0);
    }
    return (b.score || 0) - (a.score || 0); // default: score desc
  });

  if (!filtered.length) {
    wrap.innerHTML = '<div class="empty-state"><h2>No Matches</h2><p>Try adjusting filters or search.</p></div>';
    return;
  }

  let html = `
    <div class="col-headers">
      <div class="col-h center">Score</div>
      <div class="col-h">Owner / Document</div>
      <div class="col-h right">Amount</div>
      <div class="col-h right">Actions</div>
    </div>
  `;

  filtered.forEach((r, i) => {
    const score = r.score || 0;
    const scoreCls = score >= 70 ? 'score-red' : score >= 40 ? 'score-orange' : 'score-white';
    const tierCls  = score >= 70 ? 'tier-red'   : score >= 40 ? 'tier-orange'  : 'tier-white';
    const catCls = 'cat-' + (r.cat || 'OTHER');
    const propAddr = r.prop_address
      ? `${r.prop_address}, ${r.prop_city || ''} ${r.prop_zip || ''}`.trim()
      : null;
    const mailAddr = r.mail_address
      ? `${r.mail_address}, ${r.mail_city || ''} ${r.mail_state || ''} ${r.mail_zip || ''}`.trim()
      : null;
    const amt = r.amount ? '$' + Number(r.amount).toLocaleString(undefined, {minimumFractionDigits:0}) : '—';
    const distressFlags = new Set(['Tax delinquency','Code / HOA violation','Probate / estate','Divorce / bankruptcy']);
    const warnFlags = new Set(['Lis pendens','Pre-foreclosure','Judgment lien','Lien on record']);
    const flags = (r.flags || []).map(f => {
      const cls = distressFlags.has(f) ? 'flag flag-distress' : warnFlags.has(f) ? 'flag flag-warn' : 'flag';
      return `<span class="${cls}">${f}</span>`;
    }).join('');
    const linkHtml = r.clerk_url
      ? `<a class="link-btn" href="${r.clerk_url}" target="_blank" rel="noopener">View Doc →</a>`
      : '<span style="font-family:var(--mono);font-size:0.62rem;color:var(--muted)">No link</span>';

    html += `
      <div class="lead-card ${tierCls}" style="animation-delay:${i * 20}ms">
        <div class="score-col">
          <div class="score-ring ${scoreCls}" title="Seller Score: ${score}/100">
            <svg width="38" height="38" viewBox="0 0 38 38" style="position:absolute;top:0;left:0;transform:rotate(-90deg)">
              <circle cx="19" cy="19" r="15" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="3"/>
              <circle cx="19" cy="19" r="15" fill="none"
                stroke="${score>=70?'#ff4444':score>=40?'#fb923c':'#3a3f55'}"
                stroke-width="3"
                stroke-dasharray="${Math.round(score*0.942)} 94.2"
                stroke-linecap="round"/>
            </svg>
            <span style="position:relative;z-index:1;font-size:0.62rem">${score}</span>
          </div>
        </div>
        <div class="card-body">
          <div class="card-top">
            <span class="cat-badge ${catCls}">${r.cat_label || r.cat}</span>
            <span class="doc-num">${r.doc_num || '—'}</span>
          </div>
          <div class="owner-name">${r.owner || '<em style="color:var(--muted)">Unknown Owner</em>'}</div>
          <div class="card-addresses">
            <div class="addr-block">
              <span class="addr-label">Property</span>
              <span class="addr-value ${propAddr ? '' : 'no-addr'}">${propAddr || 'No address matched'}</span>
            </div>
            <div class="addr-block">
              <span class="addr-label">Mailing</span>
              <span class="addr-value ${mailAddr ? '' : 'no-addr'}">${mailAddr || '—'}</span>
            </div>
          </div>
          <div class="flag-row">${flags}</div>
        </div>
        <div class="amount-col">
          <span class="amount-value">${amt}</span>
          <span class="filed-date">${r.filed || '—'}</span>
          <span class="filed-date" style="color:#3a3f55">${r.doc_type || ''}</span>
        </div>
        <div class="actions-col">
          ${linkHtml}
        </div>
      </div>
    `;
  });

  wrap.innerHTML = html;
}

// ─── CSV Export ──────────────────────────────────────
document.getElementById('export-csv').addEventListener('click', () => {
  const cols = [
    'First Name','Last Name','Mailing Address','Mailing City','Mailing State','Mailing Zip',
    'Property Address','Property City','Property State','Property Zip',
    'Lead Type','Document Type','Date Filed','Document Number',
    'Amount/Debt Owed','Seller Score','Motivated Seller Flags','Source','Public Records URL'
  ];

  const rows = allRecords.map(r => {
    const parts = (r.owner || '').trim().split(/\s+/);
    const first = parts[0] || '';
    const last = parts.slice(1).join(' ');
    return [
      first, last,
      r.mail_address || '', r.mail_city || '', r.mail_state || 'TX', r.mail_zip || '',
      r.prop_address || '', r.prop_city || '', r.prop_state || 'TX', r.prop_zip || '',
      r.cat_label || '', r.doc_type || '', r.filed || '', r.doc_num || '',
      r.amount ? '$' + Number(r.amount).toLocaleString() : '',
      r.score || 0,
      (r.flags || []).join('; '),
      'Harris County Clerk',
      r.clerk_url || ''
    ].map(v => `"${String(v).replace(/"/g, '""')}"`).join(',');
  });

  const csv = [cols.map(c => `"${c}"`).join(','), ...rows].join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `hc_leads_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
});
</script>
