# Harris County Motivated Seller Lead Scraper

Automated daily scraper for **Harris County, TX** public records — surfaces motivated seller
leads (lis pendens, foreclosures, tax deeds, liens, judgments, probate, and more) with
property + mailing address enrichment from HCAD parcel data.

---

## Architecture

```
.github/workflows/scrape.yml   ← GitHub Actions (daily 07:00 UTC + manual trigger)
scraper/
  fetch.py                     ← Main scraper (Playwright + requests/BS4 + HCAD)
  requirements.txt
dashboard/
  index.html                   ← GitHub Pages dashboard
  records.json                 ← Latest lead data (auto-updated)
data/
  records.json                 ← Mirror of dashboard/records.json
  leads_ghl.csv                ← GHL-ready export (auto-generated)
```

---

## Lead Types

| Code       | Description              |
|------------|--------------------------|
| LP         | Lis Pendens              |
| NOFC       | Notice of Foreclosure    |
| TAXDEED    | Tax Deed                 |
| JUD / CCJ / DRJUD | Judgment types  |
| LNCORPTX / LNIRS / LNFED | Tax liens |
| LN / LNMECH / LNHOA | General liens |
| MEDLN      | Medicaid Lien            |
| PRO        | Probate                  |
| NOC        | Notice of Commencement   |
| RELLP      | Release Lis Pendens      |

---

## Seller Score (0–100)

| Criterion                  | Points |
|----------------------------|--------|
| Base                       | 30     |
| Per flag                   | +10    |
| LP + Foreclosure combo     | +20    |
| Amount > $100k             | +15    |
| Amount > $50k              | +10    |
| New this week              | +5     |
| Has property address       | +5     |

**Flags:** Lis pendens · Pre-foreclosure · Judgment lien · Tax lien ·
Mechanic lien · Probate / estate · LLC / corp owner · New this week

---

## Setup

### 1. Fork / clone this repo

### 2. Enable GitHub Pages
- Repo Settings → Pages → Source: **GitHub Actions**

### 3. Enable Actions
- Repo → Actions tab → Enable workflows

The scraper will run automatically at 07:00 UTC every day.
Trigger manually via **Actions → Scrape Harris County Leads → Run workflow**.

---

## Local development

```bash
pip install -r scraper/requirements.txt
python -m playwright install chromium
python scraper/fetch.py
```

Output is written to `dashboard/records.json` and `data/`.

