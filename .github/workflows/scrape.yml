name: Scrape Harris County Leads

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  scrape:
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    outputs:
      hot_leads: ${{ steps.count.outputs.hot_leads }}
      total:     ${{ steps.count.outputs.total }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Install Playwright
        run: python -m playwright install --with-deps chromium

      - name: Run scraper
        run: python scraper/fetch.py
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}

      - name: Count hot leads
        id: count
        run: |
          python3 - << 'PYEOF'
          import json, os
          try:
            with open("dashboard/records.json") as f:
              data = json.load(f)
            records = data.get("records", [])
            hot = [r for r in records if (r.get("score") or 0) >= 70 and "New this week" in (r.get("flags") or [])]
            total = len(records)
            print(f"Total: {total}, Hot new: {len(hot)}")
            with open(os.environ["GITHUB_OUTPUT"], "a") as out:
              out.write(f"hot_leads={len(hot)}\n")
              out.write(f"total={total}\n")
          except Exception as e:
            print(f"Count error: {e}")
            with open(os.environ["GITHUB_OUTPUT"], "a") as out:
              out.write("hot_leads=0\ntotal=0\n")
          PYEOF

      - name: Upload debug HTML
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: debug-html
          path: debug/
          retention-days: 3

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git stash || true
          git pull --rebase origin main || true
          git stash pop || true
          git add dashboard/records.json data/records.json data/leads_ghl.csv || true
          git diff --staged --quiet || git commit -m "chore: update leads [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Email alert for hot leads ──────────────────────────────────────────────
  email-alert:
    needs: scrape
    runs-on: ubuntu-22.04
    if: ${{ needs.scrape.outputs.hot_leads > 0 }}

    steps:
      - name: Send email alert
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.ALERT_EMAIL_USER }}
          password: ${{ secrets.ALERT_EMAIL_PASS }}
          to: ${{ secrets.ALERT_EMAIL_TO }}
          from: Harris County Leads <${{ secrets.ALERT_EMAIL_USER }}>
          subject: "🔥 ${{ needs.scrape.outputs.hot_leads }} New Hot Lead(s) — Harris County"
          body: |
            Your daily Harris County lead scraper has found new high-score leads.

            Hot leads (score 70+) today: ${{ needs.scrape.outputs.hot_leads }}
            Total leads in dashboard:    ${{ needs.scrape.outputs.total }}

            View your dashboard:
            https://c060291m.github.io/harris-county-leads

            Leads are sorted by score — highest distress signals at the top.

            ───────────────────────────────────
            Harris County Motivated Seller Leads
            Refreshed daily at 07:00 UTC

  # ── Deploy dashboard to GitHub Pages ──────────────────────────────────────
  deploy-pages:
    needs: scrape
    runs-on: ubuntu-22.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard/
      - id: deployment
        uses: actions/deploy-pages@v4
