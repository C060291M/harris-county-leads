## GHL CSV columns

`First Name · Last Name · Mailing Address · Mailing City · Mailing State · Mailing Zip ·
Property Address · Property City · Property State · Property Zip · Lead Type ·
Document Type · Date Filed · Document Number · Amount/Debt Owed · Seller Score ·
Motivated Seller Flags · Source · Public Records URL`

---

## Notes

- The clerk portal uses ASP.NET `__doPostBack` — **Playwright** handles the JS rendering.  
- HCAD parcel data is downloaded from `pdata.hcad.org` (DBF inside ZIP); the script tries
  multiple year URLs automatically.  
- All errors are caught per-record — one bad record never stops the run.  
- Deduplication is by `doc_num`.
